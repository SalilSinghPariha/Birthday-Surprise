<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
text-align:center;
color:white;
}

/* intro text */

#intro{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
}

/* gift */

#gift{
display:none;
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
}

/* popup */

#popup{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:650px;
height:380px;

background:#ff2d55;

border-radius:25px;

box-shadow:0 10px 40px rgba(0,0,0,0.5);

display:none;

overflow:hidden;

}

/* glowing heart background */

#heart{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:180px;

opacity:.15;

animation:beat 1s infinite;

}

@keyframes beat{

0%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.2)}
100%{transform:translate(-50%,-50%) scale(1)}

}

/* message */

#message{

position:absolute;

top:40%;
width:100%;

font-size:40px;

font-weight:bold;

}

/* floating icons */

.float{

position:absolute;

bottom:-50px;

font-size:35px;

animation:floatUp linear infinite;

}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-450px);
opacity:0;
}

}

</style>
</head>

<body>

<div id="intro">✨ Someone Sent You a Surprise ✨</div>

<div id="gift">🎁</div>

<div id="popup">

<div id="heart">❤️</div>

<div id="message"></div>

</div>

<script>

/* show gift after intro */

setTimeout(()=>{

document.getElementById("intro").style.display="none";

document.getElementById("gift").style.display="block";

},2500);


/* birthday messages */

const messages=[

"🎉 Happy Happy Birthday 🎂",

"🥳 Wishing You a Fantastic Day!",

"❤️ May Your Life Be Filled With Joy!",

"🎈 Have an Amazing Celebration!",

"🎉 Enjoy Your Special Day!"

];

/* change message */

function changeMessage(){

let msg=messages[Math.floor(Math.random()*messages.length)];

document.getElementById("message").innerHTML=msg;

}

/* floating icons */

const icons=["🎈","❤️","🥳","🎉","😊","😍"];

function floatIcons(){

let icon=document.createElement("div");

icon.className="float";

icon.innerHTML=icons[Math.floor(Math.random()*icons.length)];

icon.style.left=Math.random()*600+"px";

icon.style.animationDuration=(3+Math.random()*3)+"s";

document.getElementById("popup").appendChild(icon);

setTimeout(()=>icon.remove(),6000);

}

/* gift click */

document.getElementById("gift").onclick=function(){

this.style.display="none";

document.getElementById("popup").style.display="block";

changeMessage();

setInterval(changeMessage,3000);

setInterval(floatIcons,350);

}

</script>

</body>
</html>
