<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎉</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
text-align:center;
color:white;
}

/* Gift */

#gift{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
transition:0.3s;
}

#gift:hover{
transform:translate(-50%,-50%) scale(1.2);
}

/* Beating heart */

#mainHeart{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:150px;
display:none;
animation:beat 1s infinite;
}

@keyframes beat{
0%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.2)}
100%{transform:translate(-50%,-50%) scale(1)}
}

/* birthday text */

#message{
position:absolute;
top:60%;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
display:none;
}

/* floating items */

.item{
position:absolute;
bottom:-100px;
font-size:40px;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* banner popup */

#banner{
position:fixed;
top:20px;
left:50%;
transform:translateX(-50%);
background:white;
color:#ff4081;
padding:15px 35px;
border-radius:30px;
font-size:26px;
font-weight:bold;
box-shadow:0 8px 25px rgba(0,0,0,0.3);
display:none;
animation:slideDown 0.6s ease;
}

@keyframes slideDown{
0%{top:-80px;opacity:0}
100%{top:20px;opacity:1}
}

/* confetti */

.confetti{
position:absolute;
width:10px;
height:10px;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(720deg);
}
}

</style>
</head>

<body>

<div id="gift">🎁</div>

<div id="mainHeart">❤️</div>

<div id="message">
🎉 Happy Happy Birthday 🎂 🥳
</div>

<div id="banner"></div>

<script>

/* floating icons */

const icons=["🎈","❤️","🥳","💃","🕺","🎉","😊","😍"];

function floatItems(){

let item=document.createElement("div");

item.className="item";

item.innerHTML=icons[Math.floor(Math.random()*icons.length)];

item.style.left=Math.random()*100+"vw";

item.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(item);

setTimeout(()=>item.remove(),9000);

}

/* confetti burst */

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");

c.className="confetti";

c.style.left=Math.random()*100+"vw";

c.style.background=`hsl(${Math.random()*360},100%,50%)`;

c.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);

}

}

/* repeating banner messages */

const messages=[
"🎉 Happy Happy Birthday 🎂",
"🥳 Wishing You an Amazing Day!",
"🎈 May Your Day Be Filled With Joy!",
"❤️ Lots of Happiness and Smiles!",
"🎉 Enjoy Your Special Day!"
];

function showBanner(){

let banner=document.getElementById("banner");

let msg=messages[Math.floor(Math.random()*messages.length)];

banner.innerHTML=msg;

banner.style.display="block";

setTimeout(()=>{
banner.style.display="none";
},3000);

}

/* gift click event */

document.getElementById("gift").onclick=function(){

this.style.display="none";

document.getElementById("mainHeart").style.display="block";

document.getElementById("message").style.display="block";

setInterval(floatItems,500);

confetti();

setInterval(showBanner,5000);

}

</script>

</body>
</html>
