<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Birthday Surprise</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:Arial;
background:black;
color:white;
text-align:center;
}

/* intro text */

#intro{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:40px;
font-weight:bold;
}

/* gift */

#gift{
display:none;
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
}

/* popup */

#popup{

position:fixed;

top:50%;
left:50%;

transform:translate(-50%,-50%);

width:650px;
height:420px;

background:#ff2d55;

border-radius:25px;

box-shadow:0 10px 50px rgba(0,0,0,0.8);

display:none;

overflow:hidden;

}

/* image */

#photo{

width:130px;
height:130px;

border-radius:50%;

object-fit:cover;

border:5px solid white;

position:absolute;

top:20px;
left:50%;

transform:translateX(-50%);

}

/* glowing heart */

#heart{

position:absolute;

top:50%;
left:50%;

transform:translate(-50%,-50%);

font-size:180px;

opacity:.15;

animation:beat 1s infinite;

}

@keyframes beat{

0%{transform:translate(-50%,-50%) scale(1)}
50%{transform:translate(-50%,-50%) scale(1.2)}
100%{transform:translate(-50%,-50%) scale(1)}

}

/* message */

#message{

position:absolute;

top:55%;

width:100%;

font-size:36px;

font-weight:bold;

}

/* floating icons background */

.bgFloat{

position:absolute;

bottom:-50px;

font-size:35px;

animation:floatUp linear infinite;

}

@keyframes floatUp{

0%{
transform:translateY(0);
opacity:1;
}

100%{
transform:translateY(-110vh);
opacity:0;
}

}

</style>
</head>

<body>

<div id="intro">✨ Someone Sent You a Surprise ✨</div>

<div id="gift">🎁</div>

<div id="popup">

<img id="photo" src="photo.jpg">

<div id="heart">❤️</div>

<div id="message"></div>

</div>

<script>

/* intro to gift */

setTimeout(()=>{

document.getElementById("intro").style.display="none";

document.getElementById("gift").style.display="block";

},2500);


/* messages */

const messages=[

"🎉 Happy Happy Birthday 🎂",

"🥳 Wishing You a Fantastic Day!",

"❤️ May Your Life Be Filled With Joy!",

"🎈 Have an Amazing Celebration!",

"🎉 Enjoy Your Special Day!"

];


/* change message */

function changeMessage(){

let msg=messages[Math.floor(Math.random()*messages.length)];

document.getElementById("message").innerHTML=msg;

}


/* popup floating icons */

const icons=["🎈","❤️","🥳","🎉","💃","🕺","😍"];

function floatIcons(){

let icon=document.createElement("div");

icon.className="bgFloat";

icon.innerHTML=icons[Math.floor(Math.random()*icons.length)];

icon.style.left=Math.random()*100+"vw";

icon.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(icon);

setTimeout(()=>icon.remove(),8000);

}


/* start background floating */

setInterval(floatIcons,400);


/* gift click */

document.getElementById("gift").onclick=function(){

this.style.display="none";

document.getElementById("popup").style.display="block";

changeMessage();

setInterval(changeMessage,3000);

}

</script>

</body>
</html>
