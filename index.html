<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Birthday Surprise 🎁</title>

<style>

body{
margin:0;
overflow:hidden;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
font-family:Arial;
text-align:center;
color:white;
}

/* gift box */

#gift{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:120px;
cursor:pointer;
transition:transform .3s;
}

#gift:hover{
transform:translate(-50%,-50%) scale(1.2);
}

/* popup banner */

#banner{
position:fixed;
top:40%;
left:50%;
transform:translate(-50%,-50%);
background:white;
color:#ff4081;
padding:40px 60px;
border-radius:20px;
font-size:45px;
font-weight:bold;
box-shadow:0 10px 40px rgba(0,0,0,.4);
display:none;
animation:popup 1s ease;
}

@keyframes popup{
0%{transform:translate(-50%,-50%) scale(0)}
100%{transform:translate(-50%,-50%) scale(1)}
}

/* floating objects */

.item{
position:absolute;
bottom:-100px;
font-size:40px;
animation:float linear infinite;
}

@keyframes float{
0%{transform:translateY(0)}
100%{transform:translateY(-120vh)}
}

/* confetti */

.confetti{
position:absolute;
width:10px;
height:10px;
background:red;
top:-10px;
animation:fall linear forwards;
}

@keyframes fall{
to{
transform:translateY(120vh) rotate(720deg);
}
}

</style>
</head>

<body>

<div id="gift">🎁</div>

<div id="banner">
🎉 Happy Happy Birthday 🎂 🥳 <br>
❤️ Wishing You Lots of Happiness ❤️
</div>

<script>

const icons=["🎈","❤️","🥳","💃","🕺","🎉","😊","😍"];

function floatItems(){

let item=document.createElement("div");
item.className="item";

item.innerHTML=icons[Math.floor(Math.random()*icons.length)];

item.style.left=Math.random()*100+"vw";
item.style.animationDuration=(6+Math.random()*5)+"s";

document.body.appendChild(item);

setTimeout(()=>item.remove(),9000);

}

/* confetti burst */

function confetti(){

for(let i=0;i<120;i++){

let c=document.createElement("div");
c.className="confetti";

c.style.left=Math.random()*100+"vw";
c.style.background=`hsl(${Math.random()*360},100%,50%)`;
c.style.animationDuration=(3+Math.random()*3)+"s";

document.body.appendChild(c);

setTimeout(()=>c.remove(),5000);

}

}

/* gift click surprise */

document.getElementById("gift").onclick=function(){

this.style.display="none";

setInterval(floatItems,500);

confetti();

setTimeout(()=>{
document.getElementById("banner").style.display="block";
},1500);

}

</script>

</body>
</html>
