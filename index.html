<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Romantic Birthday Surprise</title>

<style>

body{
margin:0;
overflow:hidden;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#000000,#1a001a,#330033);
color:white;
text-align:center;
}

/* intro */

#intro{
position:absolute;
top:40%;
left:50%;
transform:translateX(-50%);
font-size:38px;
letter-spacing:2px;
}

/* gift */

#gift{
display:none;
position:absolute;
top:55%;
left:50%;
transform:translate(-50%,-50%);
font-size:100px;
cursor:pointer;
transition:.3s;
}

#gift:hover{
transform:translate(-50%,-50%) scale(1.2);
}

/* FULL SCREEN BANNER */

#popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:radial-gradient(circle at center,#2b002b,#000000);
display:none;
overflow:hidden;
}

/* center message */

#mainMessage{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:42px;
font-weight:bold;
text-align:center;
line-height:1.6;
text-shadow:0 0 20px pink,0 0 40px red;
animation:fadeIn 2s ease forwards;
opacity:0;
}

@keyframes fadeIn{
to{opacity:1;}
}

/* romantic typing */

#typeText{
border-right:2px solid white;
white-space:nowrap;
overflow:hidden;
animation:typing 6s steps(40,end), blink .8s infinite;
}

@keyframes typing{
from{width:0}
to{width:100%}
}

@keyframes blink{
50%{border-color:transparent}
}

/* floating hearts */

.heart{
position:absolute;
bottom:-20px;
font-size:22px;
animation:floatUp linear infinite;
opacity:.8;
}

@keyframes floatUp{
0%{transform:translateY(0) scale(.8)}
100%{transform:translateY(-110vh) scale(1.3); opacity:0}
}

/* sparkle */

.sparkle{
position:absolute;
font-size:18px;
animation:sparkle 2s linear forwards;
}

@keyframes sparkle{
0%{opacity:1; transform:scale(.5)}
100%{opacity:0; transform:scale(1.5) translateY(-30px)}
}

/* photo */

#photo{
position:absolute;
top:15%;
left:50%;
transform:translateX(-50%);
width:140px;
height:140px;
border-radius:50%;
border:4px solid white;
box-shadow:0 0 20px pink;
}

/* cake */

#cake{
position:absolute;
bottom:10%;
left:50%;
transform:translateX(-50%);
font-size:70px;
animation:fadeIn 3s;
}

/* love message */

#love{
position:absolute;
bottom:5%;
left:50%;
transform:translateX(-50%);
font-size:28px;
color:#ff99cc;
text-shadow:0 0 10px red;
animation:fadeIn 5s;
}

/* soft glow overlay */

#overlay{
position:absolute;
width:100%;
height:100%;
background:radial-gradient(circle, transparent, black 90%);
}

/* music hidden */

audio{
display:none;
}

</style>
</head>

<body>

<div id="intro">✨ Muski ❤️ Click the Gift for Magic ✨</div>

<div id="gift">🎁</div>

<div id="popup">

<div id="overlay"></div>

<img id="photo" src="photo.jpg">

<div id="mainMessage">
<div id="typeText">
Happy Birthday My Love ❤️ <br>
You Are My Heart, My Soul, My Everything 💖 <br>
Forever Yours... Always Yours 💫
</div>
</div>

<div id="cake">🎂</div>
<div id="love">I Love You Endless ❤️</div>

</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_3c1aab6c40.mp3">
</audio>

<script>

/* intro */

setTimeout(()=>{
intro.style.display="none";
gift.style.display="block";
},2500);

/* floating hearts */

function createHeart(){
let h=document.createElement("div");
h.className="heart";
h.innerHTML="❤️";
h.style.left=Math.random()*100+"vw";
h.style.animationDuration=(4+Math.random()*4)+"s";
document.body.appendChild(h);
setTimeout(()=>h.remove(),8000);
}
setInterval(createHeart,300);

/* sparkle */

function sparkle(){
let s=document.createElement("div");
s.className="sparkle";
s.innerHTML="✨";
s.style.left=Math.random()*100+"vw";
s.style.top=Math.random()*100+"vh";
document.body.appendChild(s);
setTimeout(()=>s.remove(),2000);
}
setInterval(sparkle,400);

/* open gift */

gift.onclick=function(){

this.innerHTML="💝";

setTimeout(()=>{
popup.style.display="block";
music.play();
},800);

}

</script>

</body>
</html>
